<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dolmenwood</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        display: flex;
        height: 100vh;
        background: #1a1a2e;
        font-family: Georgia, serif;
      }

      #map { flex: 1; height: 100vh; min-width: 0; }

      .leaflet-overlay-pane svg { mix-blend-mode: multiply; }

      /* Ручка для изменения ширины */
      #resize-handle {
        width: 5px;
        height: 100vh;
        cursor: col-resize;
        background: #8b7355;
        opacity: 0.4;
        flex-shrink: 0;
        transition: opacity 0.2s;
        z-index: 500;
      }
      #resize-handle:hover { opacity: 0.9; }
      #sidebar.hidden + #resize-handle,
      #sidebar.hidden ~ #resize-handle { display: none; }

      #sidebar {
        width: 35%;
        min-width: 260px;
        max-width: 80%;
        height: 100vh;
        background: #f5f0e8;
        border-left: 2px solid #8b7355;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        /* transition только когда hidden — не мешать drag */
      }
      #sidebar.hidden { width: 0 !important; min-width: 0; border: none; }

      /* Мобильный: поверх карты на весь экран */
      @media (max-width: 768px) {
        #resize-handle { display: none !important; }
        #sidebar {
          position: fixed;
          top: 0; left: 0;
          width: 100% !important;
          max-width: 100%;
          height: 100vh;
          z-index: 2000;
          border-left: none;
          transition: transform 0.3s ease;
          transform: translateX(0);
        }
        #sidebar.hidden {
          transform: translateX(100%);
          width: 100% !important;
        }
        #toggle-btn {
          display: block !important;
        }
      }

      #sidebar-header {
        padding: 14px 16px;
        background: #3a2e1e;
        color: #f5f0e8;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
      }
      #sidebar-title { font-size: 15px; font-weight: bold; }
      #sidebar-close {
        background: none; border: none; color: #f5f0e8;
        font-size: 18px; cursor: pointer; opacity: 0.7; line-height: 1;
      }
      #sidebar-close:hover { opacity: 1; }

      #sidebar-body {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        color: #2a1e0e;
        font-size: 14px;
        line-height: 1.75;
      }
      #sidebar-body h3 { font-size: 16px; margin: 18px 0 8px; color: #3a2e1e; }
      #sidebar-body h4 { font-size: 14px; margin: 14px 0 6px; color: #5a3e1e; }
      #sidebar-body p  { margin: 0 0 10px; }
      #sidebar-body img { max-width: 100%; border-radius: 4px; margin: 8px 0; display: block; }
      #sidebar-body table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
      #sidebar-body td, #sidebar-body th { border: 1px solid #c8b89a; padding: 4px 8px; }
      #sidebar-body hr { border: none; border-top: 1px solid #c8b89a; margin: 14px 0; }

      #sidebar-placeholder { color: #9a8a6a; font-style: italic; text-align: center; margin-top: 40px; font-size: 13px; }
      #loading { display: none; text-align: center; padding: 20px; color: #9a8a6a; font-style: italic; }

      #toggle-btn {
        position: absolute;
        top: 12px; right: 12px;
        z-index: 1000;
        background: #3a2e1e;
        color: #f5f0e8;
        border: none;
        padding: 6px 14px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        display: none;
      }
      #toggle-btn:hover { background: #5a4e3e; }

      .leaflet-container { background: #1a1a2e; }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <div id="resize-handle"></div>
    <div id="sidebar">
      <div id="sidebar-header">
        <span id="sidebar-title">Dolmenwood</span>
        <button id="sidebar-close">✕</button>
      </div>
      <div id="loading">Загрузка...</div>
      <div id="sidebar-body">
        <p id="sidebar-placeholder">Кликни на гекс чтобы увидеть описание</p>
      </div>
    </div>

    <button id="toggle-btn">☰ Открыть</button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      // === ПАРАМЕТРЫ СЕТКИ ===
      const IMG_W       = 5080;
      const IMG_H       = 3627;
      const R           = 155;
      const MARGIN_LEFT = -172;
      const MARGIN_TOP  = -263;
      const START_COL   = 1;
      const COLS        = 21;
      const GDOC_URL    = 'https://docs.google.com/document/d/e/2PACX-1vSO6_U4VUaWlVo8yUXt9-7kZWp2qMB4YS2fpM5ui4fWcrL5WCbWxqOvWRggkun2xiNy03m78VaEUrAE/pub';
      // =======================

      const stepX = 1.5 * R;
      const stepY = Math.sqrt(3) * R;
      const ROWS  = Math.ceil((IMG_H - 2 * Math.abs(MARGIN_TOP)) / stepY) + 2;
      const bounds = [[0, 0], [IMG_H, IMG_W]];

      const map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: -3,
        maxZoom: 3,
      });

      L.imageOverlay('map.webp', bounds).addTo(map);
      map.fitBounds(bounds);

      let docCache = null;
      let docIndex = null;

      async function fetchDoc() {
        if (docCache) return docCache;
        const res = await fetch(GDOC_URL);
        const html = await res.text();
        docCache = new DOMParser().parseFromString(html, 'text/html');
        return docCache;
      }

      async function loadDocIndex() {
        if (docIndex) return docIndex;
        const doc = await fetchDoc();
        docIndex = {};
        doc.querySelectorAll('h2').forEach(h => {
          const text = h.textContent.trim();
          const match = text.match(/^Гекс\s+(\d{4})/);
          if (!match) return;
          const hexId = match[1];
          const fullyExplored = text.includes('полностью изучен');
          docIndex[hexId] = { fullyExplored, heading: text };
        });
        return docIndex;
      }

      async function loadHexContent(hexId) {
        const sidebar = document.getElementById('sidebar');
        const title   = document.getElementById('sidebar-title');
        const body    = document.getElementById('sidebar-body');
        const loading = document.getElementById('loading');

        sidebar.classList.remove('hidden');
        document.getElementById('toggle-btn').style.display = 'none';

        title.textContent = `Гекс ${hexId}`;
        body.innerHTML = '';
        loading.style.display = 'block';

        try {
          const doc   = await fetchDoc();
          const index = await loadDocIndex();

          if (!index[hexId]) {
            loading.style.display = 'none';
            body.innerHTML = `<p id="sidebar-placeholder">Для гекса ${hexId} пока нет описания.</p>`;
            return;
          }

          const headings = Array.from(doc.querySelectorAll('h2'));
          const target = headings.find(h => {
            const match = h.textContent.trim().match(/^Гекс\s+(\d{4})/);
            return match && match[1] === hexId;
          });

          if (!target) {
            loading.style.display = 'none';
            body.innerHTML = `<p id="sidebar-placeholder">Для гекса ${hexId} пока нет описания.</p>`;
            return;
          }

          title.textContent = index[hexId].heading;

          const content = document.createElement('div');
          let node = target.nextElementSibling;
          while (node && node.tagName !== 'H2') {
            content.appendChild(node.cloneNode(true));
            node = node.nextElementSibling;
          }

          loading.style.display = 'none';
          body.appendChild(content);

        } catch (e) {
          loading.style.display = 'none';
          body.innerHTML = `<p style="color:#c0392b">Ошибка загрузки документа.</p>`;
          console.error(e);
        }
      }

      document.getElementById('sidebar-close').addEventListener('click', () => {
        document.getElementById('sidebar').classList.add('hidden');
        document.getElementById('toggle-btn').style.display = 'block';
      });
      document.getElementById('toggle-btn').addEventListener('click', () => {
        document.getElementById('sidebar').classList.remove('hidden');
        document.getElementById('toggle-btn').style.display = 'none';
      });

      // Resize handle (только десктоп)
      const handle  = document.getElementById('resize-handle');
      const sidebar = document.getElementById('sidebar');
      let isResizing = false;

      handle.addEventListener('mousedown', e => {
        isResizing = true;
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
      });

      document.addEventListener('mousemove', e => {
        if (!isResizing) return;
        const newWidth = window.innerWidth - e.clientX;
        const clamped  = Math.min(Math.max(newWidth, 260), window.innerWidth * 0.8);
        sidebar.style.width = clamped + 'px';
        map.invalidateSize();
      });

      document.addEventListener('mouseup', () => {
        if (!isResizing) return;
        isResizing = false;
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        map.invalidateSize();
      });

      function hexLatLngs(cx, cy, r) {
        let pts = [];
        for (let i = 0; i < 6; i++) {
          const a = i * 60 * Math.PI / 180;
          pts.push([IMG_H - (cy + r * Math.sin(a)), cx + r * Math.cos(a)]);
        }
        return pts;
      }

      // Единая функция стиля — чтобы не было рассинхрона между обработчиками
      function hexStyle(hasContent, fullyExplored, state) {
        // state: 'default' | 'hover' | 'active'
        if (fullyExplored) {
          return {
            fillColor:   '#52b788',
            color:       '#2d6a4f',
            weight:      state === 'active' ? 2 : 1,
            fillOpacity: state === 'active' ? 0.7 : state === 'hover' ? 0.65 : 0.45,
          };
        } else if (hasContent) {
          return {
            fillColor:   '#c9a84c',
            color:       '#a07830',
            weight:      state === 'active' ? 2 : 1,
            fillOpacity: state === 'active' ? 0.7 : state === 'hover' ? 0.65 : 0.45,
          };
        } else {
          return {
            fillColor:   '#4a9eff',
            color:       '#4a9eff',
            weight:      state === 'active' ? 2 : 1,
            fillOpacity: state === 'active' ? 0.3 : state === 'hover' ? 0.15 : 0,
          };
        }
      }

      fetch('hexes.json')
        .then(r => r.json())
        .then(async hexes => {
          const hexMap = {};
          hexes.forEach(h => { hexMap[`${h.col}_${h.row}`] = h.id; });

          const index = await loadDocIndex();

          let activeHex = null;

          for (let col = START_COL; col <= START_COL + COLS - 1; col++) {
            const cx     = MARGIN_LEFT + R + col * stepX;
            const shiftY = col % 2 === 0 ? stepY / 2 : 0;

            for (let row = 0; row < ROWS; row++) {
              const cy = MARGIN_TOP + stepY / 2 + row * stepY + shiftY;
              if (cy - R > IMG_H || cy + R < 0) continue;

              const key   = `${col}_${row}`;
              const hexId = hexMap[key];
              if (!hexId) continue;

              const fullyExplored = index[hexId]?.fullyExplored ?? false;
              const hasContent    = !!index[hexId];

              const polygon = L.polygon(
                hexLatLngs(cx, cy, R),
                hexStyle(hasContent, fullyExplored, 'default')
              )
              .on('mouseover', function() {
                if (activeHex === this) return;
                this.setStyle(hexStyle(hasContent, fullyExplored, 'hover'));
              })
              .on('mouseout', function() {
                if (activeHex === this) return;
                this.setStyle(hexStyle(hasContent, fullyExplored, 'default'));
              })
              .on('click', function() {
                if (activeHex && activeHex !== this) {
                  const m = activeHex._hexMeta;
                  activeHex.setStyle(hexStyle(m.hasContent, m.fullyExplored, 'default'));
                }
                activeHex = this;
                this.setStyle(hexStyle(hasContent, fullyExplored, 'active'));
                loadHexContent(hexId);
              })
              .addTo(map);

              // Сохраняем мета прямо на полигоне
              polygon._hexMeta = { hasContent, fullyExplored };
            }
          }
        });
    </script>
  </body>
</html>
